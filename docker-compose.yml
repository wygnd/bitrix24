services:
  # GRAMPUS BACKEND
  backend:
    build:
      context: ./gateways/grampus
      dockerfile: ./Dockerfile
    container_name: bitrix-server-backend
    ports:
      - "${GATEWAY_PORT}:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      - neuro
      - robots
    volumes:
      - /var/lib/bitrix24/logs/grampus:/app/logs
    networks:
      - monitoring
    restart: always
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  # ADDY BACKEND
  addy:
    build:
      context: ./gateways/addy
      dockerfile: ./Dockerfile
    container_name: bitrix-server-addy
    ports:
      - "${ADDY_GATEWAY_PORT}:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - /var/lib/bitrix24/logs/addy:/app/logs
    networks:
      - monitoring
    restart: always
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  # MICROSERVICES
  # NEURO
  neuro:
    build:
      context: ./microservices/neuro
      dockerfile: ./Dockerfile
    container_name: bitrix-microservice-neuro
    env_file:
      - .env
    volumes:
      - /var/lib/bitrix24/logs/microservices/neuro:/app/logs
    restart: always
    networks:
      - monitoring

  # ROBOTS
  robots:
    build:
      context: ./microservices/robots
      dockerfile: ./Dockerfile
    container_name: bitrix-microservice-robots
    env_file:
      - .env
    volumes:
      - /var/lib/bitrix24/microservices/logs/robots:/app/logs
      - /srv/bitrix24/microservices/robots/sessions:/app/sessions
    restart: always
    networks:
      - private

  # OTHER SERVICES
  # RabbitMQ
  # Database
  postgres:
    image: postgres:latest
    container_name: bitrix-server-postgres
    env_file:
      - .env
    # ports:
    #   - "${DB_PORT_INTERNAL}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME_PRODUCTION}
      POSTGRES_PASSWORD: ${DB_PASSWORD_PRODUCTION}
      POSTGRES_DB: ${DB_NAME_PRODUCTION}
    volumes:
      - /var/lib/bitrix24/postgresql:/var/lib/postgresql
    networks:
      - monitoring
      - private
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME_PRODUCTION}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:latest
    container_name: bitrix-server-redis
    env_file:
      - .env
    # ports:
    #   - "${REDIS_PORT_INTERNAL}:6379"
    volumes:
      - /var/lib/bitrix24/redis/data:/data
    networks:
      - monitoring
      - private
    command: redis-server --requirepass  ${REDIS_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Storage logs
  loki:
    image: grafana/loki:latest
    container_name: bitrix-server-grafana_loki
    ports:
      - "${LOKI_PORT_INTERNAL}:3100"
    volumes:
      - loki_data:/loki
    networks:
      - monitoring
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: wget -q --tries=1 -O- http://localhost:3100/ready
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: bitrix-server-prometheus
    ports:
      - "${PROMETHEUS_PORT_INTERNAL}:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus-config
      - prometheus_data:/prometheus
    networks:
      - monitoring
    command:
      - --config.file=/etc/prometheus-config/prometheus.yaml
    restart: on-failure
    depends_on:
      - backend

  # Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: bitrix-server-grafana
    ports:
      - "${GRAFANA_PORT_INTERNAL}:3000"
    environment:
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana-config
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: wget -q --tries=1 -O- http://localhost:3000/api/health
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Collection logs
  promtail:
    image: grafana/promtail:latest
    container_name: bitrix-server-promtail
    volumes:
      - /var/lib/bitrix24/logs:/app/logs:ro # logging backend files
      - /var/run/docker.sock:/var/run/docker.sock # logging backend console
      - ./config/promtail/promtail.yml:/etc/promtail/config.yml
      - /var/lib/bitrix24/promtail/promtail-positions:/tmp
      - /var/log:/var/log:ro # logging other logs. Ex: nginx
    networks:
      - monitoring
    command: -config.file=/etc/promtail/config.yml

networks:
  monitoring:
    driver: bridge
  private:
    driver: bridge
    internal: true

volumes:
  loki_data:
  grafana_data:
  prometheus_data:
